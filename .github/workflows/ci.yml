name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Tests
        # Nutzt die pytest.ini-Optionen (-n auto, loadscope). Tests, die die
        # gitignorierte Deployment-Config /opt/ems/config.yaml brauchen, werden
        # hier automatisch übersprungen.
        run: pytest -q
