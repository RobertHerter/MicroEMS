[pytest]
# Parallel per Default (pytest-xdist): die Suite ist stark solver-/ML-lastig
# und CPU-gebunden. -n auto nutzt alle Kerne; --dist loadscope hält die Tests
# EINES Moduls im selben Worker (in Reihenfolge) - robust gegenüber modul-
# lokalem Prozess-State (z.B. optimizer._warm_cache, forecast._ML_CACHE).
# Braucht pytest-xdist (requirements-dev.txt). Voller Lauf ~4-5 min statt ~10.
addopts = -n auto --dist loadscope

# Schneller Smoke-Lauf ohne die schwersten Solver-/ML-Tests:
#   pytest -m "not slow"      (~1 min)
# Voller Lauf (CI / vor dem Commit):
#   pytest                    (alle Tests, parallel)
markers =
    slow: rechenintensiver MILP-/ML-Test (im Smoke-Lauf via -m "not slow" aus)

# PuLP 3.x warnt bei jeder direkten LpVariable-Konstruktion vor der PuLP-4.0-API
# ("Constructing LpVariable ... directly is deprecated"). Der Optimierer erzeugt
# pro Solve hunderte Variablen; über tausende Solver-Läufe in den Tests sind das
# zehntausende identische, harmlose Zeilen -> gezielt ausblenden (Migration auf
# prob.add_variable erst nötig, wenn PuLP 4.0 kommt).
filterwarnings =
    ignore:Constructing LpVariable:DeprecationWarning
