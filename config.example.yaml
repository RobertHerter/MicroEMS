# =============================================================================
# EMS – Konfiguration (Beispiel)
# Kopieren nach config.yaml und anpassen.
# Alle Leistungen in W, Energien in Wh, Preise in ct/kWh, Zeiten lokal.
# =============================================================================

general:
  timezone: "Europe/Berlin"
  # Länge der Steuertabelle (Optimierungshorizont)
  optimization_horizon_hours: 48
  # Länge der Verbrauchsprognose, die in die DB geschrieben wird
  forecast_horizon_hours: 72
  # Zeitraster in Minuten (15 = 96 Slots/Tag)
  slot_minutes: 15
  # Wie oft der Dienst rechnet (nur bei --loop). In Minuten.
  run_interval_minutes: 15

# -----------------------------------------------------------------------------
# InfluxDB – Version 1 oder 2 wählen. Nur der jeweilige Block muss gefüllt sein.
# -----------------------------------------------------------------------------
influxdb:
  version: 2            # 1 oder 2

  # ---- Version 1.x (InfluxQL) -------------------------------------------------
  v1:
    host: "localhost"
    port: 8086
    username: ""
    password: ""
    database: "homey"
    ssl: false
    verify_ssl: false

  # ---- Version 2.x (Flux) -----------------------------------------------------
  v2:
    url: "http://localhost:8086"
    token: "MEIN_INFLUX_TOKEN"
    org: "meine-org"
    bucket: "homey"

  # ---- Signal-Zuordnung -------------------------------------------------------
  # Für jedes Eingangssignal: measurement + field (+ optionale Tag-Filter).
  # Diese Namen an die tatsächliche Homey/InfluxDB-Struktur anpassen.
  signals:
    house_consumption:      { measurement: "power", field: "house_load_w" }
    electricity_price:      { measurement: "price", field: "import_ct_kwh" }
    battery_soc:            { measurement: "battery", field: "soc_percent" }   # 0..100
    pv_generation:          { measurement: "power", field: "pv_w" }
    pv_forecast:            { measurement: "forecast", field: "pv_w" }         # Zukunftswerte
    # Solcast-Unsicherheitsband (optional): p10 macht die Einspeise-Linie an
    # Peak-Tagen wolken-robust, p90 wird im Dashboard als Band angezeigt.
    # pv_forecast_p10:      { measurement: "forecast", field: "pv_estimate10", optional: true }
    # pv_forecast_p90:      { measurement: "forecast", field: "pv_estimate90", optional: true }
    vehicle_soc:            { measurement: "car", field: "soc_percent", optional: true }
    # Wallbox-Status (0/1, optional): Auto wird nur mitoptimiert, wenn wirklich
    # angesteckt - sonst genügt ein alter SoC-Wert in der DB als (falsches) Indiz.
    # vehicle_connected:    { measurement: "car", field: "connected", optional: true, aggregation: "last" }
    # Netz-Leistung (für Ersparnis-Tracking): positiv = Bezug, negativ =
    # Einspeisung (Vorzeichen ggf. per scale: -1 drehen).
    # grid_power:           { measurement: "power", field: "grid_w", optional: true }
    # Einspeisevergütung aus DB (nur wenn feed_in.mode == "db")
    feed_in_tariff:         { measurement: "price", field: "feedin_ct_kwh" }

  # ---- Ziel-Measurements (EMS schreibt hierhin) -------------------------------
  outputs:
    load_forecast:   "ems_load_forecast"   # prognostizierter Hausverbrauch (W)
    control_table:   "ems_control"         # Steuerbefehle (W) je Slot, 48h
    predicted_state: "ems_prediction"      # prognostizierte SoCs, Netz, Kosten je Slot
    savings:         "ems_savings"         # Ersparnis-Tracking (Ist vs. Baseline)

# -----------------------------------------------------------------------------
# Einspeisevergütung
# -----------------------------------------------------------------------------
feed_in:
  mode: "fixed"          # "fixed" oder "db"
  fixed_ct_kwh: 8.11     # gilt nur bei mode == "fixed"
  # Solarspitzengesetz (§51 EEG, Neuanlagen ab 2025): keine Vergütung in
  # Stunden mit negativem Börsenpreis -> Export dort mit 0 ct bewerten.
  zero_at_negative_price: false

# -----------------------------------------------------------------------------
# Bezugspreis / Tarifmodell (Energy-Charts statt InfluxDB)
# -----------------------------------------------------------------------------
# enabled: true = Bezugspreis wird aus dem Energy-Charts-Spotpreis (kostenlos,
# kein Key) über das Tarifmodell berechnet, statt aus der InfluxDB gelesen.
# Aufbau je Slot (dynamisch):
#   netto  = spot*(1+markup_percent/100) + markup_ct_kwh + levies_ct_kwh + netzentgelt
#   brutto = netto*(1+vat_percent/100)                    <- MwSt auf alles
# Der Spot wird lokal in der SQLite (e3dc_rscp.history_db_path) gecacht; einmaliger
# Backfill der Historie: python energycharts_backfill.py --config config.yaml
tariff:
  enabled: false
  type: "dynamic"          # "dynamic" (spotbasiert) | "fixed" (konstant)
  fixed_ct_kwh: 30.0        # nur bei type=fixed: konstanter BRUTTO-Preis
  bidding_zone: "DE-LU"     # Energy-Charts-Gebotszone
  markup_percent: 3.0       # Aufschlag auf den Spot in %
  markup_ct_kwh: 0.0        # zusätzlicher fixer Marge-Aufschlag (netto ct/kWh)
  levies_ct_kwh: 15.0       # Steuern & Abgaben zusammengefasst (netto ct/kWh):
                            # Stromsteuer + KWKG/§19/Offshore/Konzessionsabgabe ...
  vat_percent: 19.0         # MwSt
  history_backfill_days: 400
  # Netzentgelt:
  #   "included" – schon in markup/levies enthalten (nichts zusätzlich)
  #   "static"   – konstant grid_fee_ct_kwh (netto)
  #   "14a"      – §14a EnWG zeitvariabel (Fensterliste unten)
  grid_fee_mode: "static"
  grid_fee_ct_kwh: 8.0
  # Bei grid_fee_mode: "14a" – erstes passendes Fenster gewinnt, sonst Default.
  # Filter (alle optional, in lokaler Zeit): hours (Ints oder "H-H", Ende exkl.),
  # months [1..12], date_from/date_to "MM-DD" (Wrap über Jahreswechsel ok),
  # weekdays [0=Mo..6=So]. Werte vom eigenen Netzbetreiber übernehmen!
  grid_fee_default_ct_kwh: 8.0
  grid_fee_windows:
    - {ct_kwh: 12.0, hours: ["16-20"]}                       # HT nachmittags
    - {ct_kwh: 3.0,  hours: ["0-6"], date_from: "11-01", date_to: "02-28"}  # NT Winter-Nacht

# -----------------------------------------------------------------------------
# PV-Vorhersage / Solcast (statt InfluxDB pv_forecast)
# -----------------------------------------------------------------------------
# enabled: true = PV-Prognose (inkl. P10/P90) kommt direkt von Solcast rooftop
# sites, lokal in der SQLite gecacht. Mehrere Keys UND Resourcen möglich.
#   combine: "sum"  -> Resourcen sind verschiedene Arrays (z.B. Ost/West) -> addieren
#            "mean" -> dieselbe Anlage über mehrere Keys (nur mehr Abrufe) -> mitteln
# Abruf-Budget: calls_per_key_per_day (Free-Tier 10) je Key. Die Abrufe werden
# gleichmäßig über das Tageslicht-Fenster [window_start_hour, window_end_hour)
# verteilt (je Quelle key_budget / Quellen-je-Key mal am Tag), damit Solcasts
# Nowcasting tagsüber laufend einfließt. Fenster 0..24 = ganzer Tag.
solcast:
  enabled: false
  combine: "sum"
  calls_per_key_per_day: 10
  window_start_hour: 5
  window_end_hour: 22
  sources:
    - {api_key: "DEIN_KEY_1", resource_id: "aaaa-bbbb-cccc-dddd"}   # z.B. Ost-Dach
    - {api_key: "DEIN_KEY_1", resource_id: "eeee-ffff-0000-1111"}   # z.B. West-Dach
    # weiterer Account für mehr Abrufe derselben Anlage (combine: "mean"):
    # - {api_key: "DEIN_KEY_2", resource_id: "..."}

# -----------------------------------------------------------------------------
# Haus-Batteriespeicher
# -----------------------------------------------------------------------------
house_battery:
  capacity_wh: 10000
  max_dc_charge_w: 5000       # max. DC-Ladeleistung (aus PV)
  max_ac_charge_w: 3000       # max. AC-Ladeleistung (aus Netz)
  max_discharge_w: 5000       # max. Entladeleistung
  min_soc_percent: 10
  max_soc_percent: 100
  charge_efficiency: 0.96     # DC-Laden aus PV, 0..1
  discharge_efficiency: 0.96  # 0..1
  # AC-Laden (Netz) läuft zusätzlich durch den Wechselrichter -> real
  # schlechter als DC-Laden. Weglassen = wie charge_efficiency.
  ac_charge_efficiency: 0.92

# -----------------------------------------------------------------------------
# Wechselrichter
# -----------------------------------------------------------------------------
inverter:
  max_ac_power_w: 8000        # max. AC-Leistung (Summe Durchsatz)
  # Einspeisebegrenzung am Netzanschluss (60/70%-Regel bzw. §9 EEG), in W.
  # Weglassen = keine Begrenzung.
  # max_export_w: 7000

# -----------------------------------------------------------------------------
# Fahrzeug (optional – wird nur optimiert, wenn vehicle_soc verfügbar ist)
# -----------------------------------------------------------------------------
vehicle:
  enabled: true
  capacity_wh: 60000
  max_charge_w: 11000
  min_charge_w: 1400          # minimale Ladeleistung, wenn geladen wird (sonst 0)
  min_soc_percent: 20
  target_soc_percent: 80
  departure_time: "07:00"     # tägliche Abfahrtzeit (lokal)
  # Abweichende Abfahrtzeit je Wochentag (mo..so). Nicht genannte Tage nutzen
  # departure_time; null oder "-" = keine Abfahrt an dem Tag.
  # departure_times:
  #   mo: "06:30"
  #   sa: null
  #   so: null
  charge_efficiency: 0.92
  # Ladekurve: ab diesem SoC (%) sinkt die max. Ladeleistung linear bis auf
  # min_charge_w bei 100 % (reale Autos tapern oberhalb ~80 %). 100 = aus.
  # Nur relevant, wenn target_soc_percent > taper_start_soc_percent.
  taper_start_soc_percent: 100

# -----------------------------------------------------------------------------
# Optimierung
# -----------------------------------------------------------------------------
optimization:
  # Wert des am Ende des Horizonts gespeicherten Akku-Inhalts (ct/kWh).
  # Verhindert, dass der Akku am Horizontende myopisch entleert wird.
  # "auto" = mittlerer Importpreis des Horizonts, oder feste Zahl in ct/kWh.
  terminal_soc_value: "auto"
  # Kleiner Zyklus-Malus in ct je voll zyklierter kWh (rein + raus)
  # gegen unnötiges Laden/Entladen.
  cycle_penalty_ct_kwh: 0.1
  # Muss die reale Löszeit sicher abdecken! Erreicht CBC das Limit, wird der
  # beste Zwischenstand publiziert (Alarm auf ems/alert) - der kann deutlich
  # suboptimal sein. Läuft alle 15 min -> 300 s sind unkritisch.
  solver_time_limit_s: 300
  # CBC-Threads. 0 = automatisch (CPU-Kerne - 1).
  solver_threads: 0
  # Malus (ct) je Wallbox-Einschaltvorgang gegen Dauer-Takten bei zappeligen
  # Preisen (Schützverschleiß). 0 = aus.
  car_switch_penalty_ct: 5.0
  # Strafe (ct/kWh) je fehlender kWh zum Auto-Ziel-SoC bei Abfahrt (weiche
  # Nebenbedingung: unerreichbares Ziel -> so viel wie möglich laden + Alarm).
  car_target_penalty_ct_kwh: 200.0

# -----------------------------------------------------------------------------
# Verbrauchsprognose (Ähnliche-Tage-Mittelung)
# -----------------------------------------------------------------------------
forecast:
  lookback_days: 730          # Historie, die betrachtet wird (2 Jahre)
  holiday_country: "DE"
  holiday_subdivision: "BY"   # Bundesland (z.B. BY, BW, NW ...)
  # Gewichte für die Ähnlichkeit (siehe forecast.py)
  weight_same_weekday: 3.0
  weight_same_daytype: 2.0    # Werktag/Wochenende/Feiertag
  weight_same_month: 1.5
  weight_same_season: 1.0
  min_samples: 3              # min. Stichproben pro Slot, sonst Fallback
  # Rezenz: jüngere Historie exponentiell höher gewichten (Halbwertszeit in
  # Tagen). Verhaltensänderungen schlagen so zeitnah durch. 0 = aus.
  half_life_days: 120
  # Intraday-Korrektur: Ist/Prognose-Verhältnis der letzten Stunden auf die
  # Zukunft anwenden (mit Lead-Time abklingend) - für Last und PV.
  intraday_enabled: true
  intraday_window_hours: 3.0   # Fenster für das Ist/Prognose-Verhältnis
  intraday_decay_hours: 6.0    # Halbwertszeit des Abklingens
  intraday_max_factor: 1.5     # Begrenzung des Faktors (und 1/x nach unten)
  # Geschätzte (noch unbekannte) Folgetag-Preise zur Mitte stauchen, damit
  # nicht auf Phantom-Preistäler spekuliert wird. 0 = aus, 1 = flach.
  price_damping: 0.3

# -----------------------------------------------------------------------------
# MQTT (Ausgabe an Homey)
# -----------------------------------------------------------------------------
mqtt:
  enabled: true
  host: "localhost"
  port: 1883
  username: ""
  password: ""
  base_topic: "ems"
  # Aktuelle Sollwerte des laufenden Slots als Einzeltopics publizieren
  publish_setpoints: true
  # Zusätzlich komplette 48h-Tabelle als JSON publizieren
  publish_schedule_json: true
  qos: 1
  # Gilt nur für ems/schedule (Info-Tabelle). Sollwerte werden grundsätzlich
  # NICHT retained (Fail-safe: keine veralteten Steuerbefehle nach EMS-Ausfall).
  retain: true
  # ems/schedule schlank halten (Homey kappt große Payloads): nur diese Felder
  # je Slot, höchstens schedule_max_hours Stunden (0 = ganzer Horizont).
  schedule_max_hours: 24
  # schedule_fields: [batt_charge_limit_w, batt_discharge_limit_w,
  #   batt_grid_charge_w, batt_grid_discharge_w, car_charge_w, mode,
  #   house_soc_percent, price_ct_kwh]   # weglassen = diese Standardfelder

# -----------------------------------------------------------------------------
# Ersparnis-Tracking: vergleicht je Slot die Ist-Netzkosten (gemessen) mit der
# simulierten "Ohne-EMS"-Baseline (E3DC-Eigenverbrauchsmodus). Kumulierte
# Ersparnis erscheint im Dashboard-Titel und im Measurement outputs.savings.
# Benötigt die Signale pv_generation, house_consumption, grid_power, Preis.
# -----------------------------------------------------------------------------
savings:
  enabled: true
  state_path: "./savings_state.json"

# -----------------------------------------------------------------------------
# Monitoring: Predicted-vs-Actual-SoC-Drift (Modell gegen Realität).
# MAE (Prozentpunkte) Prognose-SoC vs. gemessener SoC im Fenster -> ems_drift;
# über der Schwelle Warnung auf ems/alert.
# -----------------------------------------------------------------------------
monitoring:
  drift_enabled: true
  drift_window_hours: 12
  drift_alert_percent: 8

# -----------------------------------------------------------------------------
# Debug-Report-Button im Dashboard (nur sichtbar bei enabled: true). Bei einer
# Implausibilität lädt der Button den Schnappschuss (Eingaben + Plan des letzten
# Laufs, zum Reproduzieren) herunter und öffnet das Mailprogramm vorausgefüllt
# an mail_to - die JSON hängt man manuell an (kein SMTP-Server nötig).
# -----------------------------------------------------------------------------
report:
  enabled: false
  mail_to: ""
  snapshot_path: "./last_run_debug.json"

# -----------------------------------------------------------------------------
# Temperatur direkt von Open-Meteo (kostenlos, kein API-Key) statt InfluxDB.
# latitude/longitude des Standorts setzen. Der Dienst frischt je Zyklus die
# letzten past_days (max 92) + forecast_days auf; tiefe Historie einmalig:
#   python weather_backfill.py --config config.yaml --days 730
# -----------------------------------------------------------------------------
weather:
  enabled: false
  latitude: 0.0
  longitude: 0.0
  past_days: 92
  forecast_days: 4

# -----------------------------------------------------------------------------
# Optionale DIREKTE E3DC-Anbindung per RSCP (Bibliothek pye3dc, siehe
# requirements). Default aus; ändert nichts am InfluxDB/MQTT-Weg.
#   read_live       : Live-SoC/PV/Last direkt vom E3DC statt aus InfluxDB
#   control_enabled : Lade-/Entladelimits direkt per RSCP setzen (GREIFT REAL
#                     in den Speicher ein - erst nach Prüfung aktivieren!)
#   key             : RSCP-Passwort (im E3DC unter Einstellungen gesetzt)
#   grid_sign/batt_sign: Vorzeichen anpassen (+ = Netzbezug bzw. Laden)
# Historie separat importieren: python rscp_import.py --config config.yaml
# -----------------------------------------------------------------------------
e3dc_rscp:
  enabled: false
  host: ""              # IP des E3DC im LAN
  username: ""          # E3DC-Portal-Login
  password: ""
  key: ""               # RSCP-Passwort
  read_live: true
  control_enabled: false
  grid_sign: 1.0
  batt_sign: 1.0
  # Verbrauchsprognose aus lokaler SQLite (per RSCP gefüllt) statt InfluxDB.
  # Erstbefüllung: python rscp_import.py --config config.yaml --days 730
  # (danach hält der Dienst sie zyklisch aktuell). Schritt Richtung Standalone.
  history_source: false
  history_db_path: "./e3dc_history.sqlite"
  history_backfill_days: 730

# -----------------------------------------------------------------------------
# Dashboard
# -----------------------------------------------------------------------------
dashboard:
  enabled: true
  output_path: "./dashboard.html"
